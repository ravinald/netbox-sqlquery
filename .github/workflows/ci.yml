name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        include:
          - netbox-version: "4.0.11"
            python-version: "3.11"
          - netbox-version: "4.5.5"
            python-version: "3.12"
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: netbox
          POSTGRES_PASSWORD: netbox
          POSTGRES_DB: netbox
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Clone NetBox v${{ matrix.netbox-version }}
        run: |
          git clone --branch v${{ matrix.netbox-version }} --depth 1 \
            https://github.com/netbox-community/netbox.git /opt/netbox

      - name: Install NetBox dependencies
        run: |
          cd /opt/netbox
          pip install -r requirements.txt

      - name: Install plugin
        run: pip install -e .

      - name: Configure NetBox
        run: |
          cat > /opt/netbox/netbox/netbox/configuration.py << 'CONF'
          ALLOWED_HOSTS = ['*']
          DATABASES = {
              'default': {
                  'ENGINE': 'django.db.backends.postgresql',
                  'NAME': 'netbox',
                  'USER': 'netbox',
                  'PASSWORD': 'netbox',
                  'HOST': 'localhost',
                  'PORT': '5432',
              }
          }
          REDIS = {
              'tasks': {'HOST': 'localhost', 'PORT': 6379, 'DATABASE': 0},
              'caching': {'HOST': 'localhost', 'PORT': 6379, 'DATABASE': 1},
          }
          SECRET_KEY = 'abcdefghijklmnopqrstuvwxyz0123456789abcdefghijklmnop'
          PLUGINS = ['netbox_sqlquery']
          CONF

      - name: Run migrations
        run: |
          cd /opt/netbox/netbox
          python manage.py migrate --no-input

      - name: Run tests
        run: |
          cd /opt/netbox/netbox
          python manage.py test netbox_sqlquery --no-input

  docker-test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Clone netbox-docker
        run: |
          git clone --depth 1 \
            https://github.com/netbox-community/netbox-docker.git /tmp/netbox-docker

      - name: Set up plugin files
        run: |
          cp -r . /tmp/netbox-docker/netbox-sqlquery
          # Create Dockerfile that installs from local source
          cat > /tmp/netbox-docker/Dockerfile-Plugins << 'DOCKERFILE'
          FROM netboxcommunity/netbox:latest
          COPY --from=ghcr.io/astral-sh/uv:0.10 /uv /usr/local/bin/
          COPY ./netbox-sqlquery /opt/netbox-sqlquery
          RUN /usr/local/bin/uv pip install -e /opt/netbox-sqlquery
          COPY ./configuration/plugins.py /etc/netbox/config/plugins.py
          RUN DEBUG="true" \
              SECRET_KEY="abcdefghijklmnopqrstuvwxyz0123456789abcdefghijklmnop" \
              /opt/netbox/venv/bin/python /opt/netbox/netbox/manage.py collectstatic --no-input
          DOCKERFILE
          # Create compose override (netbox + worker only, no housekeeping)
          cat > /tmp/netbox-docker/docker-compose.override.yml << 'YAML'
          services:
            netbox:
              image: netbox:ci-plugins
              pull_policy: never
              ports:
                - 8000:8080
              build:
                context: .
                dockerfile: Dockerfile-Plugins
            netbox-worker:
              image: netbox:ci-plugins
              pull_policy: never
          YAML
          # Enable the plugin in config
          cat > /tmp/netbox-docker/configuration/plugins.py << 'EOF'
          PLUGINS = ["netbox_sqlquery"]
          EOF

      - name: Build custom image
        run: |
          cd /tmp/netbox-docker
          docker compose build --no-cache

      - name: Start stack
        run: |
          cd /tmp/netbox-docker
          docker compose up -d
          # Wait for healthy (up to 5 minutes for first-run migrations)
          for i in $(seq 1 60); do
            if docker compose ps netbox | grep -q healthy; then
              echo "NetBox is healthy"
              break
            fi
            if [ $i -eq 60 ]; then
              echo "Timed out waiting for NetBox"
              docker compose logs netbox | tail -30
              exit 1
            fi
            echo "Waiting... ($i/60)"
            sleep 5
          done

      - name: Verify plugin loads
        run: |
          cd /tmp/netbox-docker
          STATUS=$(docker compose exec -T netbox curl -s -o /dev/null -w '%{http_code}' \
            http://localhost:8080/plugins/sqlquery/)
          echo "HTTP status: $STATUS"
          [ "$STATUS" = "200" ] || [ "$STATUS" = "302" ] || [ "$STATUS" = "403" ]

      - name: Verify abstract views created
        run: |
          cd /tmp/netbox-docker
          COUNT=$(docker compose exec -T postgres psql -U netbox -d netbox -t -c \
            "SELECT COUNT(*) FROM information_schema.views WHERE table_schema='public' AND table_name LIKE 'nb_%'")
          echo "Abstract views: $COUNT"
          [ "$(echo $COUNT | tr -d ' ')" -gt 0 ]

      - name: Cleanup
        if: always()
        run: |
          cd /tmp/netbox-docker
          docker compose down -v
